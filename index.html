<!DOCTYPE HTML>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pose Box</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
  </head>
  
  <body>
    <nav class="navbar">
      <h1 class="logo">Pose<span>Box</span></h1>
    </nav>
    
    <main>
      <div class="content-wrapper">
        <div class="posebox">
          <h1>Jepretkan Momen Mu</h1>
          <section class="timer">
          <button id="s3" class="active"><i class="fa-solid fa-stopwatch"></i> 3s</button>
          <button id="s5"><i class="fa-solid fa-stopwatch"></i> 5s</button>
          <button id="s10"><i class="fa-solid fa-stopwatch"></i> 10s</button>
          </section>
        
          <section class="kamera">
            <div id="countdown">3</div>
            <video id="video" autoplay playsinline muted ></video>
            <div class="tombol">
              <button onclick="settings()"><i class="fa-solid fa-gear"></i></button>
              <button onclick="takeFoto()"><i class="fa-solid fa-camera"></i></button>
              <button onclick="gantiKamera()"><i class="fa-solid fa-camera-rotate"></i></button>
            </div>
          </section>
          
          <section class="fitur">
             <div class="button-fitur">
              <button onclick="openTemplatePopup()"><i class="fa-solid fa-border-all"></i><p>Template</p></button>
              <button onclick="openStickerPopup()"><i class="fa-regular fa-face-smile"></i><p>Stiker</p></button>
              <button onclick="openFilterPopup()"><i class="fa-solid fa-wand-magic-sparkles"></i><p>Efek</p></button>
              <button><i class="fa-solid fa-palette"></i><p>Tema</p></button>
            </div>
          </section>
        </div>
      </div>
    
    

      <aside>
        <div class="aside-wrapper">
          <h1>Hasil Jepret</h1>
          
          <div id="hasil"></div>
          <div id="hasilStrip"></div>
          <button id="downloadStripBtn"><i class="fa-solid fa-download"></i> DOWNLOAD</button>
        </div>
      </aside>
      
      <div id="settingsPopup" class="popup">
        <div class="popup-content">
          <h2>Settings</h2>
          <div class="setting-item">
            <span>Flash Kamera</span>
            <label class="switch">
              <input type="checkbox" id="flashToggle" checked>
              <span class="slider"></span>
              </label>
          </div>
          
          <div class="setting-item">
            <span>Suara Kamera</span>
            <label class="switch">
              <input type="checkbox" id="soundToggle" checked>
              <span class="slider"></span>
            </label>
          </div>
          <button id="closePopup">Tutup</button>
        </div>
      </div>
      <!-- FLASH EFFECT -->
      <div id="flash"></div>
        <!-- AUDIO -->
        <audio id="shutter" src="camera.mp3"></audio>
        
        <!-- FILTER POPUP -->
<div id="filterPopup" class="popup">
  <div class="popup-content">
    <h2>Filter Kamera</h2>
    <div class="filter-list">
      <button onclick="setFilter('none')">
        Normal
      </button>
      <button onclick="setFilter('grayscale(1)')">
        Black & White
      </button>
      <button onclick="setFilter('sepia(1)')">
        Vintage
      </button>
      <button onclick="setFilter('contrast(1.2) saturate(1.3)')">
        Warm
      </button>
      <button onclick="setFilter('brightness(1.1) contrast(1.1)')">
        Bright
      </button>
      <button onclick="setFilter('blur(2px)')">
        Blur
      </button>
    </div>
    <button id="closeFilterPopup">
      Tutup
    </button>
  </div>
</div>
        
        <div id="templatePopup" class="popup">
          <div class="popup-content">
            <h2>Pilih Background Strip</h2>
            <button onclick="pilihTemplate('pink')">🌸 Pink</button>
            <button onclick="pilihTemplate('dark')">🖤 Dark</button>
            <button onclick="pilihTemplate('retro')">📼 Retro</button>
            <button onclick="pilihTemplate('minimal')">🤍 Minimal</button>
            <button onclick="pilihTemplate('canva')">🎨 Canva Gradient</button>
            <button onclick="closeTemplate()">Tutup</button>
          </div>
        </div>
        
        <div id="stickerPopup" class="popup">
          <div class="popup-content">
            <h2>Pilih Stiker (hanya satu aktif)</h2>
            <div class="sticker-list" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">
              <button onclick="pilihStiker('📸')">📸</button>
              <button onclick="pilihStiker('✨')">✨ </button>
              <button onclick="pilihStiker('💖')">💖</button>
              <button onclick="pilihStiker('⭐')">⭐ <utton>
              <button onclick="pilihStiker('🎨')">🎨</button>
              <button onclick="pilihStiker('❤️')">❤️</button>
              <button onclick="pilihStiker('😊')">😊</button>
              <button onclick="pilihStiker('🎉')">🎉</button>
              <button onclick="pilihStiker('🌸')">🌸</button>
              <button onclick="pilihStiker('🦄')">🦄</button>
            </div>
            <button id="closeStickerPopup" style="margin-top: 15px;">Tutup</button>
          </div>
        </div>
        
        <div id="temaPopup" class="popup">
          <div class="popup-content">
            <h2>Pilih Tema Website</h2>
            <button onclick="pilihTema('pink')">🌸 Pink (Default)</button>
            <button onclick="pilihTema('creammaroon')">🤎 Cream + Maroon</button>
            <button onclick="closeTemaPopup()">Tutup</button>
          </div>
        </div>
        
    </main>
    <script src="script.js"></script>
  </body>
</html>
