<!DOCTYPE HTML>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pose Box</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <header class="nav">
  <div class="nav-inner">
    <a href="#" class="brand">
      <span>Pose<span style="font-weight: normal;">Box</span></span>
    </a>
    <input type="checkbox" id="menu-toggle" class="menu-toggle">
    <label for="menu-toggle" class="hamburger"><span></span></label>
    <ul class="menu">
      <li><a href="#">Dashboard</a></li>
      <li><a href="#">Poto Kamu</a></li>
      <li></li>
      <li></li>
      <li id="authSection">
        <button class="nav-btn login-btn" onclick="openLoginPopup()">Login</button>
        <button class="nav-btn register-btn" onclick="openRegisterPopup()">Daftar</button>
        <button class="nav-btn logout-btn" onclick="logout()" style="display:none;">Logout</button>
      </li>
      <li id="userSection" style="display:none;">
        <div class="user-info-nav">
          <img id="navAvatar" src="assets/default-avatar.png" class="nav-avatar">
          <span id="navUserName"></span>
          <span id="navUserRole" class="user-role-badge"></span>
          <button class="nav-btn logout-btn" onclick="logout()">Logout</button>
        </div>
      </li>
    </ul>
  </div>
</header>

<main>
      <div class="content-wrapper">
        <div class="posebox">
          <h1>Jepretkan Momen Mu</h1>
          <section class="timer">
          <button id="s3" class="active"><i class="fa-solid fa-stopwatch"></i> 3s</button>
          <button id="s5"><i class="fa-solid fa-stopwatch"></i> 5s</button>
          <button id="s10"><i class="fa-solid fa-stopwatch"></i> 10s</button>
          </section>
        
          <section class="kamera">
            <div id="countdown">3</div>
            <video id="video" autoplay playsinline muted ></video>
            <div class="tombol">
              <button onclick="settings()"><i class="fa-solid fa-gear"></i></button>
              <button onclick="takeFoto()"><i class="fa-solid fa-camera"></i></button>
              <button onclick="gantiKamera()"><i class="fa-solid fa-camera-rotate"></i></button>
            </div>
          </section>
          
          <section class="fitur">
             <div class="button-fitur">
              <button onclick="openTemplatePopup()"><i class="fa-solid fa-border-all"></i><p>Template</p></button>
              <button onclick="openFilterPopup()"><i class="fa-solid fa-wand-magic-sparkles"></i><p>Efek</p></button>
              <button onclick="openTemaPopup()"><i class="fa-solid fa-palette"></i><p>Tema</p></button>
            </div>
          </section>
        </div>
      </div>
    
    

      <aside>
        <div class="aside-wrapper">
          <h1>Hasil Jepret</h1>
          <button id="uploadBtn"><i class="fa-solid fa-upload"></i> Upload Gambar</button>
          <input type="file" id="fileInput" accept="image/*" style="display: none;">
          
          <div id="hasil"></div>
          <div id="hasilStrip"></div>
          <button id="downloadStripBtn"><i class="fa-solid fa-download"></i> DOWNLOAD</button>
        </div>
      </aside>
      
      <div id="settingsPopup" class="popup">
        <div class="popup-content">
          <h2>Settings</h2>
          <div class="setting-item">
            <span>Flash Kamera</span>
            <label class="switch">
              <input type="checkbox" id="flashToggle" checked>
              <span class="slider"></span>
              </label>
          </div>
          
          <div class="setting-item">
            <span>Suara Kamera</span>
            <label class="switch">
              <input type="checkbox" id="soundToggle" checked>
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>
      <!-- FLASH EFFECT -->
      <div id="flash"></div>
        <!-- AUDIO -->
        <audio id="shutter" src="camera.mp3"></audio>
        
        <!-- FILTER POPUP -->
<div id="filterPopup" class="popup">
  <div class="popup-content">
    <h2>Filter Kamera</h2>
    <div class="filter-list">
      <button onclick="setFilter('none')">
        Normal
      </button>
      <button onclick="setFilter('grayscale(1)')">
        Black & White
      </button>
      <button onclick="setFilter('sepia(1)')">
        Vintage
      </button>
      <button onclick="setFilter('contrast(1.2) saturate(1.3)')">
        Warm
      </button>
      <button onclick="setFilter('brightness(1.1) contrast(1.1)')">
        Bright
      </button>
      <button onclick="setFilter('blur(2px)')">
        Blur
      </button>
      <button onclick="setFilter('brightness(1.05) contrast(1.1) saturate(1.2) hue-rotate(-10deg)')">
        🌸 Soft Pink
      </button>
      <button onclick="setFilter('sepia(0.5) saturate(1.4) brightness(1.05)')">
        🌅 Warm Sunset
      </button>
      <button onclick="setFilter('brightness(1.02) contrast(1.05) saturate(1.1) hue-rotate(10deg)')">
        💙 Cool Blue
      </button>
      <button onclick="setFilter('sepia(0.6) contrast(1.2) brightness(0.95)')">
        📼 Vintage Warm
      </button>
      <button onclick="setFilter('contrast(1.4) brightness(1.05) saturate(1.2)')">
        ⚡ High Contrast
      </button>
      <button onclick="setFilter('blur(1px) brightness(1.05) saturate(1.1)')">
        ☁️ Dreamy
      </button>
    </div>
  </div>
</div>
        
        <div id="templatePopup" class="popup">
          <div class="popup-content" style="width: 320px;">
            <h2>Pilih Background Strip</h2>
            <div id="templateGrid" class="template-grid">
              <button onclick="pilihTemplate('pink')">🌸 Pink</button>
              <button onclick="pilihTemplate('dark')">🖤 Dark</button>
              <button onclick="pilihTemplate('retro')">📼 Retro</button>
              <button onclick="pilihTemplate('minimal')">🤍 Minimal</button>
              <button onclick="pilihTemplate('strip-1')"></button>
              <button onclick="pilihTemplate('strip-2')"></button>
              <button onclick="pilihTemplate('strip-3')">
                </button>
              <button onclick="pilihTemplate('strip-4')"></button>
              <button onclick="pilihTemplate('strip-5')"></button>
            </div>
          </div>
        </div>
        
        
        <div id="temaPopup" class="popup">
          <div class="popup-content">
            <h2>Pilih Tema Website</h2>
            <button onclick="pilihTema('pink')">🌸 Pink (Default)</button>
            <button onclick="pilihTema('creammaroon')">🤎 Cream + Maroon</button>
          </div>
        </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
